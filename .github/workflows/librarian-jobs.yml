name: Refresh librarian jobs

on:
  schedule:
    # 7am Pacific (15:00 UTC during PDT, 14:00 UTC during PST — using 14 so it
    # fires no later than 7am year-round).
    - cron: "0 14 * * *"
  workflow_dispatch: {}  # allow manual triggers from the Actions tab

permissions:
  contents: write  # for committing the refreshed jobs.json
  pages: write
  id-token: write

concurrency:
  group: librarian-jobs
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: librarian-jobs/scraper/requirements.txt

      - name: Install deps
        run: pip install -r librarian-jobs/scraper/requirements.txt

      - name: Scrape sources
        run: python librarian-jobs/scraper/scrape.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add librarian-jobs/data/jobs.json librarian-jobs/data/seen.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Refresh librarian jobs ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Upload the whole repo so other projects sharing this Pages site
      # (valentine, arizmendi-pizza, etc.) stay reachable. Librarian Jobs lives
      # at /librarian-jobs/.
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
