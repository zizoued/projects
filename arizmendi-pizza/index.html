<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arizmendi Pizza Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍕 Arizmendi Pizza</h1>
            <p class="subtitle">Inner Sunset • Daily Pizza Schedule</p>
        </header>

        <div class="today-highlight" id="today-card">
            <!-- Today's pizza will be injected here -->
        </div>

        <div class="upcoming-section">
            <h2>Upcoming Pizzas</h2>
            <div class="pizza-list" id="pizza-list">
                <!-- Pizza cards will be injected here -->
            </div>
        </div>

        <footer>
            <p>📍 1331 9th Avenue, SF</p>
            <p>⏰ Tue-Sun: 7:30am - 6pm (Pizza starts 11am)</p>
            <p>📞 (415) 566-3117</p>
            <a href="https://store.arizmendibakery.com/menu" target="_blank" class="order-btn">Order Online</a>
        </footer>
    </div>

    <script src="pizza-data.js"></script>
    <script src="script.js"></script>
</body>
</html>
